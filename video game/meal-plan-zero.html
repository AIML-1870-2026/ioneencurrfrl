<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Plan Zero</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

#game-container {
  /* Canvas appended here by engine.js */
}

#game-canvas {
  display: block;
  border: 2px solid #333;
}
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script>
// Module 1 — Shared Game State
// All modules read from and write to window.GameState.
// Do NOT store authoritative game data in module-local variables.

window.GameState = {
  // Game phase
  phase: 'start',   // 'start' | 'playing' | 'gameover' | 'win'
  score: 0,
  round: 1,

  // Canvas (set by engine.js on init)
  canvas: null,
  ctx: null,
  width: 800,     // viewport / canvas size
  height: 600,

  // World dimensions (larger than viewport — camera scrolls to show a portion)
  worldWidth:  800,
  worldHeight: 1400,

  // Camera — top-left corner of the viewport in world coordinates
  // Updated each frame by engine.js based on player position.
  cam: { x: 0, y: 0 },

  // Player
  player: {
    x: 50,           // starting position — lobby, bottom-left
    y: 1200,
    width: 20,
    height: 20,
    speed: 3,        // pixels per frame at 60fps
    crouching: false,
    inventory: [],   // food items grabbed this round
  },

  // Detection meter 0–100 (hits 100 = game over)
  detection: 0,

  // Map data — populated by Map.init()
  walls: [],         // [{ x, y, w, h }, ...]
  foods: [],         // [{ id, x, y, w, h, label, points, grabbed }, ...]
  exitZone: { x: 340, y: 1350, w: 120, h: 28 },  // front door, bottom of lobby

  // Workers — populated by Workers.init()
  workers: [],

  // Input — written by engine.js keydown/keyup listeners
  keys: {},          // { 'w': true, 'ArrowUp': true, 'Shift': true, ... }

  // Visual effects
  shakeFrames: 0,    // screen shake countdown (frames)
  shakeMag: 5,       // shake intensity (pixels)
  grabFlash: 0,      // food-grab flash ring countdown (frames)
};

// =============================================================================
// Module 2 — Map & Dining Hall
// File: js/map.js
// Exposes: window.Map = { init, draw, reset }
// Reads/writes: GameState.walls, GameState.foods, GameState.exitZone
//
// World: 800 × 1400  (camera scrolls vertically; viewport is 800×600)
//
// Zone layout (y=0 is top):
//   KITCHEN      y=20   – y=270  (food, 2 workers: Chef A + Gap Guard B)
//   COUNTER      y=270  – y=298  (serving counter; gap x=320–480)
//   UPPER DINING y=298  – y=620  (3 dining tables; Worker C patrols)
//   DIVIDER 1    y=620  – y=642  (painted wall; gap x=360–440)
//   LOWER DINING y=642  – y=980  (tables + post; Worker D patrols)
//   DIVIDER 2    y=980  – y=1000 (lobby separator; gap x=280–520)
//   LOBBY        y=1000 – y=1380 (benches, EXIT at y=1350 — player spawns here)
// =============================================================================

window.Map = (function () {

  var _time       = 0;
  var _particles  = [];
  var _MAX_PARTICLES = 60;

  // ── Wall definitions ────────────────────────────────────────────────────────
  // Index groups:
  //   0–3   outer walls (skipped by LOS check)
  //   4–5   serving counter          (gap x=320–480)
  //   6–7   zone divider 1           (gap x=360–440)
  //   8–9   zone divider 2 / lobby   (gap x=280–520)
  //   10–12 upper dining tables
  //   13–15 lower dining tables + centre post
  //   16–17 kitchen prep stations
  //   18–19 lobby benches

  const WALL_DEFS = [
    // Outer boundary
    { x:0,   y:0,    w:800, h:20   },  // 0  top
    { x:0,   y:1380, w:800, h:20   },  // 1  bottom
    { x:0,   y:0,    w:20,  h:1400 },  // 2  left
    { x:780, y:0,    w:20,  h:1400 },  // 3  right

    // Serving counter (gap x=320–480 = 160px)
    { x:20,  y:270,  w:300, h:28   },  // 4  counter-left   (x=20–320)
    { x:480, y:270,  w:300, h:28   },  // 5  counter-right  (x=480–780)

    // Zone divider 1 — upper/lower dining (gap x=360–440 = 80px)
    { x:20,  y:620,  w:340, h:22   },  // 6  div1-left
    { x:440, y:620,  w:340, h:22   },  // 7  div1-right

    // Zone divider 2 — lobby separator (gap x=280–520 = 240px, wide and easy)
    { x:20,  y:980,  w:260, h:20   },  // 8  div2-left
    { x:520, y:980,  w:260, h:20   },  // 9  div2-right

    // Upper dining tables
    { x:90,  y:350,  w:110, h:55   },  // 10 table UL
    { x:340, y:350,  w:120, h:55   },  // 11 table UM
    { x:600, y:350,  w:110, h:55   },  // 12 table UR

    // Lower dining tables + cover post
    { x:120, y:710,  w:110, h:55   },  // 13 table LL
    { x:370, y:730,  w:60,  h:55   },  // 14 centre post
    { x:570, y:710,  w:110, h:55   },  // 15 table LR

    // Kitchen prep stations (solid stainless-steel equipment)
    { x:60,  y:80,   w:100, h:50   },  // 16 prep station left
    { x:640, y:80,   w:100, h:50   },  // 17 prep station right

    // Lobby benches
    { x:60,  y:1070, w:80,  h:28   },  // 18 bench left
    { x:660, y:1070, w:80,  h:28   },  // 19 bench right
  ];

  // ── Food definitions ─────────────────────────────────────────────────────────
  // All food is in the kitchen zone (y < 270).
  // Counter food at y=240: player presses against counter from kitchen side
  //   → player.center.y ≈ 260, food.center.y ≈ 252, distance ≈ 8px ✓
  // Deep kitchen food: in the open kitchen area — higher risk/reward.

  const FOOD_DEFS = [
    // Left counter section (x=20–320, y=240)
    { id:0,  x:50,  y:240, label:'Pizza',    points:50, color:'#ff5555', glow:'#ff2020', icon:'🍕' },
    { id:1,  x:130, y:240, label:'Pasta',    points:45, color:'#f5c842', glow:'#e0a800', icon:'🍝' },
    { id:2,  x:210, y:240, label:'Soup',     points:35, color:'#f09030', glow:'#cc6600', icon:'🍜' },
    { id:3,  x:282, y:240, label:'Sandwich', points:30, color:'#d4a96a', glow:'#a07030', icon:'🥪' },
    // Deep kitchen — risk requires timing Worker A (horizontal sweep) AND Worker B (gap guard)
    { id:4,  x:340, y:140, label:'Pizza',    points:50, color:'#ff5555', glow:'#ff2020', icon:'🍕' },
    { id:5,  x:400, y:90,  label:'Pasta',    points:45, color:'#f5c842', glow:'#e0a800', icon:'🍝' },
    { id:6,  x:454, y:140, label:'Coffee',   points:20, color:'#7a5030', glow:'#4a2800', icon:'☕' },
    // Right counter section (x=480–780, y=240)
    { id:7,  x:490, y:240, label:'Muffin',   points:25, color:'#c4693a', glow:'#8b3010', icon:'🧁' },
    { id:8,  x:570, y:240, label:'Coffee',   points:20, color:'#7a5030', glow:'#4a2800', icon:'☕' },
    { id:9,  x:650, y:240, label:'Apple',    points:10, color:'#e83030', glow:'#aa0000', icon:'🍎' },
    { id:10, x:727, y:240, label:'Cookies',  points:15, color:'#e0b060', glow:'#b07820', icon:'🍪' },
  ];

  const STEAMY_IDS = new Set([1, 2, 5, 8]);   // Pasta, Soup, deep-Pasta, Coffee

  const LIGHT_FIXTURES = [
    { x:200, y:35  }, { x:400, y:35  }, { x:600, y:35  },   // kitchen
    { x:200, y:440 }, { x:400, y:440 }, { x:600, y:440 },   // upper dining
    { x:200, y:790 }, { x:400, y:790 }, { x:600, y:790 },   // lower dining
    { x:250, y:1090}, { x:550, y:1090},                     // lobby
  ];

  // ── Init ────────────────────────────────────────────────────────────────────

  function init() {
    GameState.walls = WALL_DEFS.map(function (r) {
      return { x: r.x, y: r.y, w: r.w, h: r.h };
    });
    GameState.foods = FOOD_DEFS.map(function (f) {
      return { id: f.id, x: f.x, y: f.y, w: 24, h: 24,
               label: f.label, points: f.points,
               color: f.color, glow: f.glow, icon: f.icon, grabbed: false };
    });
    GameState.exitZone = { x: 340, y: 1350, w: 120, h: 28 };
    _particles = [];
  }

  function reset() {
    GameState.foods.forEach(function (f) { f.grabbed = false; });
    _particles = [];
  }

  // ── Draw ────────────────────────────────────────────────────────────────────

  function draw(ctx) {
    _time++;
    _tickParticles();
    _spawnAmbientDust();
    _drawFloor(ctx);
    _drawWalls(ctx);
    _drawLightPools(ctx);
    _drawHeatLampGlow(ctx);
    _drawCounters(ctx);
    _drawDividers(ctx);
    _drawTables(ctx);
    _drawPrepStations(ctx);
    _drawBenches(ctx);
    _drawFoods(ctx);
    _drawExit(ctx);
    _drawParticles(ctx);
    _drawVignette(ctx);
  }

  // ── Floor ───────────────────────────────────────────────────────────────────
  // Viewport-culled tile drawing so we don't draw 600+ off-screen tiles.

  function _drawFloor(ctx) {
    var TW = 50, TH = 50;
    var cam = GameState.cam;

    // Only draw tiles currently on screen (+ one tile buffer)
    var startY = Math.floor(cam.y / TH) * TH;
    var endY   = startY + GameState.height + TH;

    for (var ty = startY; ty < endY; ty += TH) {
      for (var tx = 0; tx < 800; tx += TW) {
        var alt = ((tx / TW) + (ty / TH)) % 2 === 0;
        ctx.fillStyle = alt ? '#ddd0bc' : '#ccc0a8';
        ctx.fillRect(tx + 1, ty + 1, TW - 2, TH - 2);
        var g = ctx.createLinearGradient(tx, ty, tx + TW, ty + TH);
        g.addColorStop(0,   'rgba(255,255,255,0.14)');
        g.addColorStop(0.5, 'rgba(255,255,255,0.03)');
        g.addColorStop(1,   'rgba(0,0,0,0.08)');
        ctx.fillStyle = g;
        ctx.fillRect(tx + 1, ty + 1, TW - 2, TH - 2);
      }
    }

    // Tile grid lines — only in visible range
    ctx.strokeStyle = '#9a8c7c'; ctx.lineWidth = 1;
    for (var gx = 0; gx <= 800; gx += TW) {
      ctx.beginPath(); ctx.moveTo(gx, startY); ctx.lineTo(gx, endY); ctx.stroke();
    }
    for (var gy = startY; gy <= endY; gy += TH) {
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(800, gy); ctx.stroke();
    }

    // Kitchen zone — warm orange tint (back of house, restricted)
    var kt = ctx.createLinearGradient(0, 20, 0, 270);
    kt.addColorStop(0,   'rgba(255,190,80,0.13)');
    kt.addColorStop(1,   'rgba(255,190,80,0.04)');
    ctx.fillStyle = kt;
    ctx.fillRect(20, 20, 760, 250);

    // Lobby zone — cool institutional tint (entrance feel)
    var lt = ctx.createLinearGradient(0, 1000, 0, 1380);
    lt.addColorStop(0,   'rgba(100,130,200,0.08)');
    lt.addColorStop(1,   'rgba(100,130,200,0.04)');
    ctx.fillStyle = lt;
    ctx.fillRect(20, 1000, 760, 380);
  }

  // ── Outer walls ─────────────────────────────────────────────────────────────

  function _drawWalls(ctx) {
    [WALL_DEFS[0], WALL_DEFS[1], WALL_DEFS[2], WALL_DEFS[3]].forEach(function (r) {
      var g = ctx.createLinearGradient(r.x, r.y, r.x + r.w, r.y + r.h);
      g.addColorStop(0, '#1e1208'); g.addColorStop(1, '#2e1e10');
      ctx.fillStyle = g; ctx.fillRect(r.x, r.y, r.w, r.h);
    });

    // Inner trim lines along each wall
    ctx.fillStyle = '#4a3220';
    ctx.fillRect(20, 16, 760, 4);      // top inner trim
    ctx.fillRect(20, 1380, 760, 4);    // bottom inner trim
    ctx.fillRect(16, 20, 4, 1360);     // left inner trim
    ctx.fillRect(780, 20, 4, 1360);    // right inner trim

    // Top wall ceiling stripe
    ctx.fillStyle = '#f0f0e0'; ctx.fillRect(22, 1, 756, 3);

    // "DINING SERVICES" banner on the kitchen back wall (top)
    _drawBanner(ctx, 400, 44, 'DINING  SERVICES');

    // "ENTRANCE" banner on the lobby front wall (bottom)
    _drawBanner(ctx, 400, 1364, 'ENTRANCE');
  }

  function _drawBanner(ctx, cx, cy, text) {
    var w = 280, h = 18;
    var g = ctx.createLinearGradient(cx - w/2, cy, cx + w/2, cy);
    g.addColorStop(0, '#1a0a00'); g.addColorStop(0.1, '#3a2200');
    g.addColorStop(0.5, '#4a3010'); g.addColorStop(0.9, '#3a2200'); g.addColorStop(1, '#1a0a00');
    ctx.fillStyle = g; ctx.fillRect(cx - w/2, cy - h/2, w, h);
    ctx.strokeStyle = '#c8a040'; ctx.lineWidth = 1; ctx.strokeRect(cx - w/2, cy - h/2, w, h);
    ctx.fillStyle = '#f0c840'; ctx.font = 'bold 10px serif'; ctx.textAlign = 'center';
    ctx.letterSpacing = '3px'; ctx.fillText(text, cx, cy + 4);
    ctx.textAlign = 'left'; ctx.letterSpacing = '0px';
  }

  // ── Light pools ─────────────────────────────────────────────────────────────

  function _drawLightPools(ctx) {
    var cam = GameState.cam;
    LIGHT_FIXTURES.forEach(function (lf) {
      // Skip fixtures far off-screen for performance
      if (lf.y + 180 < cam.y || lf.y - 60 > cam.y + 600) return;

      ctx.fillStyle = '#e8e8d8'; ctx.fillRect(lf.x - 28, lf.y, 56, 8);
      ctx.fillStyle = '#fffff0'; ctx.fillRect(lf.x - 22, lf.y + 2, 44, 4);
      var poolY = lf.y + 100;
      var pulse = 0.85 + 0.15 * Math.sin(_time * 0.02 + lf.x * 0.01);
      var g = ctx.createRadialGradient(lf.x, poolY, 0, lf.x, poolY, 120);
      g.addColorStop(0,   'rgba(255,245,200,' + (0.22 * pulse) + ')');
      g.addColorStop(0.6, 'rgba(255,235,160,' + (0.06 * pulse) + ')');
      g.addColorStop(1,   'rgba(255,220,120,0)');
      ctx.fillStyle = g; ctx.fillRect(lf.x - 120, poolY - 100, 240, 220);
    });
  }

  // ── Heat lamp glow (above serving counters) ───────────────────────────────

  function _drawHeatLampGlow(ctx) {
    [WALL_DEFS[4], WALL_DEFS[5]].forEach(function (r) {
      var pulse = 0.7 + 0.3 * Math.sin(_time * 0.04);
      var g = ctx.createLinearGradient(r.x, r.y - 30, r.x, r.y + r.h);
      g.addColorStop(0, 'rgba(255,80,0,0)');
      g.addColorStop(0.5, 'rgba(255,100,10,' + (0.09 * pulse) + ')');
      g.addColorStop(1, 'rgba(255,60,0,0)');
      ctx.fillStyle = g; ctx.fillRect(r.x, r.y - 30, r.w, r.h + 30);
    });
  }

  // ── Serving counter ───────────────────────────────────────────────────────

  function _drawCounters(ctx) {
    [WALL_DEFS[4], WALL_DEFS[5]].forEach(function (r) {
      ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(r.x+3, r.y+3, r.w, r.h);
      var g = ctx.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
      g.addColorStop(0, '#c8d8e0'); g.addColorStop(0.15, '#e8f0f4');
      g.addColorStop(0.4, '#b8c8d0'); g.addColorStop(0.7, '#a0b0b8'); g.addColorStop(1, '#889098');
      ctx.fillStyle = g; ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
      for (var sy = r.y + 4; sy < r.y + r.h - 4; sy += 5) {
        ctx.beginPath(); ctx.moveTo(r.x+4, sy); ctx.lineTo(r.x+r.w-4, sy); ctx.stroke();
      }
      ctx.fillStyle = '#708090'; ctx.fillRect(r.x, r.y, r.w, 3);
      ctx.fillStyle = '#506070'; ctx.fillRect(r.x, r.y+r.h-2, r.w, 2);
      // Glass sneeze guard above counter
      var glassH = 16;
      var glassG = ctx.createLinearGradient(r.x, r.y-glassH, r.x, r.y);
      glassG.addColorStop(0, 'rgba(160,210,240,0.06)'); glassG.addColorStop(1, 'rgba(160,210,240,0.20)');
      ctx.fillStyle = glassG; ctx.fillRect(r.x, r.y-glassH, r.w, glassH);
      ctx.strokeStyle = 'rgba(200,240,255,0.5)'; ctx.lineWidth = 1;
      ctx.strokeRect(r.x, r.y-glassH, r.w, glassH);
      ctx.fillStyle = '#607080'; ctx.fillRect(r.x, r.y+r.h, r.w, 4);
    });
    ctx.fillStyle = 'rgba(255,200,80,0.55)';
    ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('▼  PASS-THROUGH  ▼', 400, 266);
    ctx.textAlign = 'left';
  }

  // ── Zone divider walls ───────────────────────────────────────────────────────

  function _drawDividers(ctx) {
    // Divider 1 — between upper and lower dining (gap x=360–440)
    [WALL_DEFS[6], WALL_DEFS[7]].forEach(function (r) {
      ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fillRect(r.x+3, r.y+3, r.w, r.h);
      var g = ctx.createLinearGradient(r.x, r.y, r.x, r.y+r.h);
      g.addColorStop(0, '#8a7a6a'); g.addColorStop(1, '#6a5a4a');
      ctx.fillStyle = g; ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fillRect(r.x, r.y, r.w, 3);
      ctx.fillStyle = '#3a2a1a'; ctx.fillRect(r.x, r.y+r.h-4, r.w, 4);
    });
    ctx.fillStyle = 'rgba(200,180,140,0.55)';
    ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PASSAGE', 400, 616);
    ctx.textAlign = 'left';

    // Divider 2 — lobby separator (gap x=280–520, wide and easy to cross)
    [WALL_DEFS[8], WALL_DEFS[9]].forEach(function (r) {
      ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(r.x+3, r.y+3, r.w, r.h);
      var g = ctx.createLinearGradient(r.x, r.y, r.x, r.y+r.h);
      g.addColorStop(0, '#7a8a9a'); g.addColorStop(1, '#5a6a7a');
      ctx.fillStyle = g; ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fillRect(r.x, r.y, r.w, 3);
      ctx.fillStyle = '#2a3a4a'; ctx.fillRect(r.x, r.y+r.h-4, r.w, 4);
    });
    ctx.fillStyle = 'rgba(160,200,255,0.45)';
    ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('LOBBY ENTRANCE  ▼', 400, 975);
    ctx.textAlign = 'left';
  }

  // ── Dining tables ────────────────────────────────────────────────────────────

  function _drawTables(ctx) {
    // Upper dining [10–12] and lower dining [13–15]
    WALL_DEFS.slice(10, 16).forEach(function (r) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; _rr(ctx, r.x+5, r.y+5, r.w, r.h, 6); ctx.fill();
      var g = ctx.createLinearGradient(r.x, r.y, r.x, r.y+r.h);
      g.addColorStop(0, '#5c3820'); g.addColorStop(0.3, '#3e2210'); g.addColorStop(1, '#281508');
      ctx.fillStyle = g; _rr(ctx, r.x, r.y, r.w, r.h, 6); ctx.fill();
      // Wood grain
      ctx.save(); ctx.beginPath(); _rr(ctx, r.x, r.y, r.w, r.h, 6); ctx.clip();
      ctx.strokeStyle = 'rgba(255,200,100,0.06)'; ctx.lineWidth = 2;
      for (var gl = r.x - 10; gl < r.x + r.w + 10; gl += 14) {
        ctx.beginPath();
        ctx.moveTo(gl, r.y);
        ctx.bezierCurveTo(gl+3, r.y+r.h*0.3, gl-2, r.y+r.h*0.7, gl+1, r.y+r.h);
        ctx.stroke();
      }
      ctx.restore();
      ctx.strokeStyle = 'rgba(180,120,60,0.45)'; ctx.lineWidth = 1.5;
      _rr(ctx, r.x+1, r.y+1, r.w-2, r.h-2, 5); ctx.stroke();
      // Chairs (skip narrow centre post)
      if (r.w >= 60 && r.h >= 50) {
        [[r.x+10, r.y-12, 28, 10], [r.x+r.w-38, r.y-12, 28, 10],
         [r.x+10, r.y+r.h+2, 28, 10], [r.x+r.w-38, r.y+r.h+2, 28, 10]
        ].forEach(function (c) {
          _rr(ctx, c[0], c[1], c[2], c[3], 3);
          ctx.fillStyle = '#3a2010'; ctx.fill();
          ctx.strokeStyle = 'rgba(255,180,80,0.2)'; ctx.lineWidth = 1; ctx.stroke();
        });
      }
      var gloss = ctx.createLinearGradient(r.x, r.y, r.x, r.y+r.h*0.4);
      gloss.addColorStop(0, 'rgba(255,255,255,0.10)'); gloss.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = gloss; _rr(ctx, r.x, r.y, r.w, r.h*0.4, 6); ctx.fill();
    });
  }

  // ── Kitchen prep stations ────────────────────────────────────────────────────

  function _drawPrepStations(ctx) {
    [WALL_DEFS[16], WALL_DEFS[17]].forEach(function (r) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(r.x+3, r.y+3, r.w, r.h);
      var g = ctx.createLinearGradient(r.x, r.y, r.x, r.y+r.h);
      g.addColorStop(0, '#d0dde0'); g.addColorStop(0.4, '#b0bfc5'); g.addColorStop(1, '#8090a0');
      ctx.fillStyle = g; ctx.fillRect(r.x, r.y, r.w, r.h);
      // Horizontal brushed lines
      ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
      for (var sy = r.y + 5; sy < r.y + r.h - 4; sy += 6) {
        ctx.beginPath(); ctx.moveTo(r.x+4, sy); ctx.lineTo(r.x+r.w-4, sy); ctx.stroke();
      }
      ctx.fillStyle = '#607080'; ctx.fillRect(r.x, r.y, r.w, 4);
      ctx.fillStyle = '#405060'; ctx.fillRect(r.x, r.y+r.h-3, r.w, 3);
      ctx.strokeStyle = 'rgba(200,220,255,0.3)'; ctx.lineWidth = 1;
      ctx.strokeRect(r.x+1, r.y+1, r.w-2, r.h-2);
    });
    // Labels
    ctx.fillStyle = 'rgba(180,210,240,0.5)';
    ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PREP', WALL_DEFS[16].x + WALL_DEFS[16].w/2, WALL_DEFS[16].y + WALL_DEFS[16].h/2 + 4);
    ctx.fillText('PREP', WALL_DEFS[17].x + WALL_DEFS[17].w/2, WALL_DEFS[17].y + WALL_DEFS[17].h/2 + 4);
    ctx.textAlign = 'left';
  }

  // ── Lobby benches ────────────────────────────────────────────────────────────

  function _drawBenches(ctx) {
    [WALL_DEFS[18], WALL_DEFS[19]].forEach(function (r) {
      ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(r.x+3, r.y+3, r.w, r.h);
      // Metal frame
      ctx.fillStyle = '#888888'; ctx.fillRect(r.x, r.y, r.w, r.h);

      ug.addColorStop(0, '#7a6a9a'); ug.addColorStop(1, '#4a4060');
      ctx.fillStyle = ug; ctx.fill();
      // Seat highlight
      ctx.fillStyle = 'rgba(255,255,255,0.12)'; _rr(ctx, r.x+4, r.y+3, r.w-8, (r.h-6)*0.4, 4); ctx.fill();
    });
  }

  // ── Food items ───────────────────────────────────────────────────────────────

  function _drawFoods(ctx) {
    GameState.foods.forEach(function (food) {
      if (food.grabbed) return;
      var bob = Math.sin(_time * 0.05 + food.id * 0.9) * 2.5;
      var fy  = food.y + bob;
      var cx  = food.x + food.w / 2;
      var cy  = fy + food.h / 2;
      var pulse = 0.7 + 0.3 * Math.sin(_time * 0.06 + food.id * 0.7);
      // Halo
      var halo = ctx.createRadialGradient(cx, cy, 2, cx, cy, 26);
      halo.addColorStop(0,   hexAlpha(food.glow, 0.5 * pulse));
      halo.addColorStop(0.6, hexAlpha(food.glow, 0.15 * pulse));
      halo.addColorStop(1,   hexAlpha(food.glow, 0));
      ctx.fillStyle = halo; ctx.fillRect(cx-26, cy-26, 52, 52);
      // Floor reflection
      ctx.beginPath(); ctx.ellipse(cx, fy+food.h+4, 18, 5, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fill();
      ctx.strokeStyle = 'rgba(200,200,200,0.5)'; ctx.lineWidth = 1; ctx.stroke();
      // Body
      _rr(ctx, food.x, fy, food.w, food.h, 6);
      var bg = ctx.createLinearGradient(food.x, fy, food.x, fy+food.h);
      bg.addColorStop(0, _lighten(food.color, 40)); bg.addColorStop(1, food.color);
      ctx.fillStyle = bg; ctx.fill();
      // Gloss
      _rr(ctx, food.x+2, fy+2, food.w-4, food.h*0.45, 4);
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
      // Outline
      _rr(ctx, food.x, fy, food.w, food.h, 6);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1; ctx.stroke();
      // Icon
      ctx.font = '15px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(food.icon, cx, cy+1); ctx.textBaseline = 'alphabetic';
      // Label
      ctx.fillStyle = '#ffffff'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 3;
      ctx.fillText(food.label, cx, fy+food.h+12); ctx.shadowBlur = 0;
      // Points badge
      _drawPointsBadge(ctx, food.x+food.w-1, fy-1, food.points);
      ctx.textAlign = 'left';
      // Steam
      if (STEAMY_IDS.has(food.id)) _spawnSteam(food.x+12, fy);
    });
  }

  function _drawPointsBadge(ctx, x, y, points) {
    var bw = 20, bh = 11;
    _rr(ctx, x-bw, y, bw, bh, 3);
    ctx.fillStyle = '#ffcc00'; ctx.fill();
    ctx.fillStyle = '#3a1a00'; ctx.font = 'bold 7px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(points + 'pt', x-bw/2, y+8); ctx.textAlign = 'left';
  }

  // ── Exit zone ────────────────────────────────────────────────────────────────

  function _drawExit(ctx) {
    var ez = GameState.exitZone;
    var pulse = 0.6 + 0.4 * Math.sin(_time * 0.07);
    var cx = ez.x + ez.w/2, cy = ez.y + ez.h/2;
    var floorGlow = ctx.createRadialGradient(cx, cy-30, 0, cx, cy-30, 90);
    floorGlow.addColorStop(0, 'rgba(0,255,120,' + (0.25*pulse) + ')');
    floorGlow.addColorStop(1, 'rgba(0,255,120,0)');
    ctx.fillStyle = floorGlow; ctx.fillRect(cx-90, cy-100, 180, 120);
    ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 20 + 10*pulse;
    _rr(ctx, ez.x-2, ez.y-2, ez.w+4, ez.h+4, 6);
    ctx.fillStyle = 'rgba(0,30,15,0.9)'; ctx.fill();
    ctx.strokeStyle = '#00cc66'; ctx.lineWidth = 2; ctx.stroke();
    ctx.shadowBlur = 0;
    _rr(ctx, ez.x, ez.y, ez.w, ez.h, 5);
    var neon = ctx.createLinearGradient(ez.x, ez.y, ez.x, ez.y+ez.h);
    neon.addColorStop(0, 'rgba(0,255,120,' + (0.18*pulse) + ')');
    neon.addColorStop(1, 'rgba(0,180,80,'  + (0.10*pulse) + ')');
    ctx.fillStyle = neon; ctx.fill();
    ctx.strokeStyle = 'rgba(0,255,140,' + (0.6+0.4*pulse) + ')';
    ctx.lineWidth = 1.5; ctx.setLineDash([5,4]); ctx.lineDashOffset = -(_time*0.6 % 9);
    _rr(ctx, ez.x, ez.y, ez.w, ez.h, 5); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(0,255,140,' + (0.5+0.5*Math.sin(_time*0.12)) + ')';
    ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('▼ EXIT ▼', cx, cy+5);
    // Sign above exit
    ctx.fillStyle = 'rgba(160,255,200,0.6)';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('← FRONT DOOR →', cx, ez.y - 10);
    ctx.textAlign = 'left';
  }

  // ── Particles ────────────────────────────────────────────────────────────────

  function _spawnAmbientDust() {
    if (_particles.length >= _MAX_PARTICLES || Math.random() > 0.25) return;
    var cam = GameState.cam;
    // Only spawn near on-screen light fixtures
    var visible = LIGHT_FIXTURES.filter(function (lf) {
      return lf.y > cam.y - 60 && lf.y < cam.y + 660;
    });
    if (!visible.length) return;
    var lf = visible[Math.floor(Math.random() * visible.length)];
    _particles.push({ type:'dust', x:lf.x+(Math.random()-0.5)*70, y:lf.y+10+Math.random()*40,
      vx:(Math.random()-0.5)*0.25, vy:-0.15-Math.random()*0.35,
      life:1.0, fade:0.004+Math.random()*0.006, r:0.8+Math.random()*1.5 });
  }

  function _spawnSteam(x, y) {
    if (_particles.length >= _MAX_PARTICLES || Math.random() > 0.15) return;
    _particles.push({ type:'steam', x:x+(Math.random()-0.5)*8, y:y,
      vx:(Math.random()-0.5)*0.4, vy:-0.5-Math.random()*0.6,
      life:1.0, fade:0.015+Math.random()*0.015, r:1.5+Math.random()*2 });
  }

  function _tickParticles() {
    for (var i = _particles.length-1; i >= 0; i--) {
      var p = _particles[i]; p.x += p.vx; p.y += p.vy; p.vx *= 0.99; p.life -= p.fade;
      if (p.life <= 0) _particles.splice(i, 1);

  function _drawParticles(ctx) {
    _particles.forEach(function (p) {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.type === 'dust'
        ? 'rgba(255,240,200,' + (p.life*0.55) + ')'
        : 'rgba(220,220,220,' + (p.life*0.35) + ')';
      ctx.fill();
    });
  }

  // ── Vignette — camera-aware so it always covers the viewport ─────────────────

  function _drawVignette(ctx) {
    var cam = GameState.cam;
    var vcx = cam.x + 400;   // viewport centre in world coords
    var vcy = cam.y + 300;
    var g = ctx.createRadialGradient(vcx, vcy, 180, vcx, vcy, 520);
    g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.52)');
    ctx.fillStyle = g; ctx.fillRect(cam.x, cam.y, 800, 600);
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function _rr(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);

  function hexAlpha(hex, a) {
    return 'rgba(' + parseInt(hex.slice(1,3),16) + ',' + parseInt(hex.slice(3,5),16) + ',' + parseInt(hex.slice(5,7),16) + ',' + a + ')';
  }

  function _lighten(hex, amt) {
    return 'rgb(' + Math.min(255,parseInt(hex.slice(1,3),16)+amt) + ',' + Math.min(255,parseInt(hex.slice(3,5),16)+amt) + ',' + Math.min(255,parseInt(hex.slice(5,7),16)+amt) + ')';
  }

  return { init: init, draw: draw, reset: reset };

})();

// Module 3 — Player Character
// Owns: movement, AABB collision, food pickup, win detection, rendering.

window.Player = (function () {

  // Facing direction — updated whenever player moves
  let facingX = 0;
  let facingY = 1;   // default: facing down toward the dining hall

  // Previous E key state for keydown detection (not held)
  let prevE = false;

  // ─── Init / Reset ─────────────────────────────────────────────────────────

  function init() {
    const p = GameState.player;
    p.x = 50;
    p.y = 1200;   // entrance lobby — bottom-left
    p.crouching = false;
    p.inventory = [];
    facingX = 0;
    facingY = 1;
    prevE = false;
  }

  function reset() { init(); }

  // ─── Update ───────────────────────────────────────────────────────────────

  function update(dt) {
    if (GameState.phase !== 'playing') return;

    const p = GameState.player;
    const keys = GameState.keys;

    // Crouch state
    p.crouching = !!(keys['Shift'] || keys['ShiftLeft'] || keys['ShiftRight']);

    // Speed this frame (spec: 3px/frame at 60fps = 180px/s)
    const pxPerSec = p.speed * 60 * (p.crouching ? 0.5 : 1);
    const spd = pxPerSec * dt;

    // Input vector
    let dx = 0, dy = 0;
    if (keys['w'] || keys['W'] || keys['ArrowUp'])    dy -= 1;
    if (keys['s'] || keys['S'] || keys['ArrowDown'])  dy += 1;
    if (keys['a'] || keys['A'] || keys['ArrowLeft'])  dx -= 1;
    if (keys['d'] || keys['D'] || keys['ArrowRight']) dx += 1;

    // Normalize diagonal movement
    if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }

    // Track facing direction for the direction dot
    if (dx !== 0 || dy !== 0) { facingX = dx; facingY = dy; }

    // ── Move X then resolve collisions ──
    p.x += dx * spd;
    for (const wall of GameState.walls) {
      if (overlap(p, wall)) {
        if (dx > 0) p.x = wall.x - p.width;
        else if (dx < 0) p.x = wall.x + wall.w;
      }
    }

    // ── Move Y then resolve collisions ──
    p.y += dy * spd;
    for (const wall of GameState.walls) {
      if (overlap(p, wall)) {
        if (dy > 0) p.y = wall.y - p.height;
        else if (dy < 0) p.y = wall.y + wall.h;
      }
    }

    // Clamp to world bounds
    const WW = GameState.worldWidth  || GameState.width;
    const WH = GameState.worldHeight || GameState.height;
    p.x = Math.max(20, Math.min(WW - p.width  - 20, p.x));
    p.y = Math.max(20, Math.min(WH - p.height - 20, p.y));

    // ── Food pickup on E keydown ──
    const eNow = !!(keys['e'] || keys['E']);
    if (eNow && !prevE) grabNearestFood();
    prevE = eNow;

    // ── Win condition ──
    const ez = GameState.exitZone;
    if (overlap(p, ez) && p.inventory.length > 0) {
      GameState.phase = 'win';
    }
  }

  // ─── AABB helpers ─────────────────────────────────────────────────────────

  function overlap(a, b) {
    const aw = a.width  ?? a.w;
    const ah = a.height ?? a.h;
    return a.x < b.x + b.w  &&
           a.x + aw > b.x   &&
           a.y < b.y + b.h  &&
           a.y + ah > b.y;
  }

  // ─── Food pickup ──────────────────────────────────────────────────────────

  function grabNearestFood() {
    const p = GameState.player;
    const pcx = p.x + p.width  / 2;
    const pcy = p.y + p.height / 2;

    let nearest = null;
    let nearestDist = Infinity;

    for (const food of GameState.foods) {
      if (food.grabbed) continue;
      const fcx = food.x + food.w / 2;
      const fcy = food.y + food.h / 2;
      const dist = Math.hypot(pcx - fcx, pcy - fcy);
      if (dist <= 40 && dist < nearestDist) {
        nearest = food;
        nearestDist = dist;
      }
    }

    if (nearest) {
      nearest.grabbed = true;
      p.inventory.push(nearest);
      GameState.score += nearest.points;
      GameState.grabFlash = 12;
    }
  }

  // ─── Draw ─────────────────────────────────────────────────────────────────

  function draw(ctx) {
    if (GameState.phase !== 'playing') return;

    const p = GameState.player;
    const cx = p.x + p.width  / 2;
    const cy = p.y + p.height / 2;
    const r  = p.crouching ? 7 : 10;

    // Optional: show detection radius ring when crouching
    if (p.crouching) {
      ctx.beginPath();
      ctx.arc(cx, cy, detectionRadius(), 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100, 180, 255, 0.18)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Grab flash ring — expands and fades out
    const gf = GameState.grabFlash || 0;
    if (gf > 0) {
      const alpha = gf / 12;
      const expandR = r + 4 + (12 - gf) * 2.5;
      ctx.beginPath();
      ctx.arc(cx, cy, expandR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 220, 0, ${alpha})`;
      ctx.lineWidth = 3;
      ctx.stroke();
      GameState.grabFlash--;
    }

    // Player body shadow
    ctx.beginPath();
    ctx.arc(cx + 2, cy + 2, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fill();

    // Player body
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = p.crouching ? '#1a66cc' : '#3399ff';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Direction dot
    const flen = Math.hypot(facingX, facingY) || 1;
    const nx = facingX / flen;
    const ny = facingY / flen;
    ctx.beginPath();
    ctx.arc(cx + nx * (r - 3), cy + ny * (r - 3), 3, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    // Inventory badge
    if (p.inventory.length > 0) {
      ctx.fillStyle = '#ffdd00';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(p.inventory.length, cx + r + 2, cy + r + 2);
      ctx.textAlign = 'left';
    }
  }

  // ─── Exposed helpers ──────────────────────────────────────────────────────

  function getHitbox() {
    const p = GameState.player;
    return { x: p.x, y: p.y, w: p.width, h: p.height };
  }

  function detectionRadius() {
    return GameState.player.crouching ? 35 : 60;
  }

  return { init, update, draw, reset, getHitbox, detectionRadius };
})();

// =============================================================================
// Module 4 — Worker AI & Detection
// File: js/workers.js
// Exposes: window.Workers = { init, update, draw, reset }
// Reads/writes: GameState.workers, GameState.detection, GameState.phase
// =============================================================================

window.Workers = (function () {

  // ---------------------------------------------------------------------------
  // Worker factory
  // ---------------------------------------------------------------------------

  function makeWorker(x, y, patrolPath, angle) {
    return {
      x,
      y,
      radius: 14,
      angle,                          // facing direction in radians (0=right, PI/2=down)
      speed: 1.2,
      state: 'patrol',                // 'patrol' | 'suspicious' | 'alert' | 'chase'
      visionRange: 150,
      visionAngle: Math.PI / 3,       // 60° cone
      patrolPath,
      pathIndex: 0,
      pathDir: 1,                     // 1=forward, -1=reverse along patrolPath
      suspicionTimer: 0,              // 0–80; fills while player is visible in patrol
      lastKnownX: null,               // player position when last seen
      lastKnownY: null,
    };
  }

  // ---------------------------------------------------------------------------
  // Angle helpers
  // ---------------------------------------------------------------------------

  /** Wrap an angle into the range (-PI, PI]. */
  function wrapAngle(a) {
    while (a >  Math.PI) a -= 2 * Math.PI;
    while (a < -Math.PI) a += 2 * Math.PI;
    return a;
  }

  /** Move `current` angle toward `target` by at most `step` radians. */
  function rotateToward(current, target, step) {
    const diff = wrapAngle(target - current);
    if (Math.abs(diff) <= step) return target;
    return current + Math.sign(diff) * step;
  }

  // ---------------------------------------------------------------------------
  // Line-of-sight helpers
  // ---------------------------------------------------------------------------

  /** Returns true if segment (x1,y1)→(x2,y2) intersects AABB r. */
  function lineBlockedByRect(x1, y1, x2, y2, r) {
    const dx = x2 - x1, dy = y2 - y1;
    let tmin = 0, tmax = 1;

    const rMaxX = r.x + r.w, rMaxY = r.y + r.h;

    if (dx === 0) { if (x1 < r.x || x1 > rMaxX) return false; }
    else {
      let t1 = (r.x  - x1) / dx, t2 = (rMaxX - x1) / dx;
      if (t1 > t2) { const tmp = t1; t1 = t2; t2 = tmp; }
      tmin = Math.max(tmin, t1); tmax = Math.min(tmax, t2);
      if (tmin > tmax) return false;
    }

    if (dy === 0) { if (y1 < r.y || y1 > rMaxY) return false; }
    else {
      let t1 = (r.y  - y1) / dy, t2 = (rMaxY - y1) / dy;
      if (t1 > t2) { const tmp = t1; t1 = t2; t2 = tmp; }
      tmin = Math.max(tmin, t1); tmax = Math.min(tmax, t2);
      if (tmin > tmax) return false;
    }

    return true;
  }

  /** Returns false if any interior wall blocks the ray worker→player. */
  function hasLineOfSight(wx, wy, px, py) {
    const WW = GameState.worldWidth  || GameState.width;
    const WH = GameState.worldHeight || GameState.height;
    for (const wall of GameState.walls) {
      // Skip outer boundary walls (they touch the world edges)
      if (wall.x <= 0 || wall.y <= 0 ||
          wall.x + wall.w >= WW ||
          wall.y + wall.h >= WH) continue;
      if (lineBlockedByRect(wx, wy, px, py, wall)) return false;
    }
    return true;
  }

  // ---------------------------------------------------------------------------
  // init
  // ---------------------------------------------------------------------------

  function init() {
    const workers = [
      // A — kitchen chef: full-width horizontal sweep of the kitchen zone.
      //     Starts centre-left, faces right. Player must time this to grab counter food.
      makeWorker(200, 180,
        [{ x: 40, y: 180 }, { x: 680, y: 180 }],
        0),

      // B — gap guard: vertical patrol through the serving counter gap (x=400).
      //     Alternates watching the kitchen (facing up) and the dining approach
      //     (facing down). The most dangerous worker — blocks the only pass-through.
      makeWorker(400, 220,
        [{ x: 400, y: 40 }, { x: 400, y: 260 }],
        -Math.PI / 2),

      // C — upper dining: full-width horizontal patrol between counter and divider.
      //     Starts left side, faces right.
      makeWorker(80, 460,
        [{ x: 60, y: 460 }, { x: 720, y: 460 }],
        0),

      // D — lower dining: starts far-right heading left (away from player spawn at y=1200).
      //     Distance to player spawn ≈ 500px, well beyond 150px vision range — safe start.
      makeWorker(720, 800,
        [{ x: 60, y: 800 }, { x: 720, y: 800 }],
        Math.PI),
    ];
    GameState.workers = workers;
  }

  // ---------------------------------------------------------------------------
  // reset  (called between rounds — receives round number for difficulty scaling)
  // ---------------------------------------------------------------------------

  function reset(round) {
    round = round || GameState.round || 1;
    const r = Math.min(round, 4);

    // Per-round scaling (index 0 = round 1)
    const speedTable  = [1.2, 1.5, 1.8, 2.1];  // chase speed
    const rangeTable  = [150, 165, 182, 200];   // vision range
    const patrolTable = [1.0, 1.3, 1.6, 1.9];  // patrol speed

    const workerSpeed = speedTable[r - 1];
    const visionRange = rangeTable[r - 1];
    const patrolSpeed = patrolTable[r - 1];

    init();

    GameState.workers.forEach(w => {
      w.speed        = patrolSpeed;
      w.visionRange  = visionRange;
      w._baseSpeed   = workerSpeed;
      w._patrolSpeed = patrolSpeed;
    });

    GameState.detection = 0;
  }

  // ---------------------------------------------------------------------------
  // update  (called every frame by the engine when phase === 'playing')
  // ---------------------------------------------------------------------------

  function update() {
    if (GameState.phase !== 'playing') return;

    const workers   = GameState.workers;
    const player    = GameState.player;
    const px        = player.x + player.width  / 2;
    const py        = player.y + player.height / 2;
    const crouching = player.crouching;

    // --- 1. Vision cone + line-of-sight check ---------------------------
    workers.forEach(w => {
      const dx            = px - w.x;
      const dy            = py - w.y;
      const dist          = Math.sqrt(dx * dx + dy * dy);
      const angleToPlayer = Math.atan2(dy, dx);
      const angleDiff     = Math.abs(wrapAngle(angleToPlayer - w.angle));
      const inCone        = (dist <= w.visionRange) && (angleDiff <= w.visionAngle / 2);
      // Counters and tables block sight — must have clear line to detect
      w._seesPlayer = inCone && (dist < 10 || hasLineOfSight(w.x, w.y, px, py));
      if (w._seesPlayer) { w.lastKnownX = px; w.lastKnownY = py; }
    });

    // --- 2. Suspicion timers + detection meter --------------------------
    let detectionGain = 0;

    workers.forEach(w => {
      if (w._seesPlayer) {
        w.suspicionTimer = Math.min(80, w.suspicionTimer + 3);
      } else {
        w.suspicionTimer = Math.max(0, w.suspicionTimer - 2);
      }

      if (w.state === 'chase') {
        detectionGain += crouching ? 2 : 3;
      } else if (w.state === 'alert') {
        detectionGain += crouching ? 1.5 : 2.5;
      } else if (w._seesPlayer && w.state === 'patrol') {
        // Suspicion ramp — full contribution only after ~1.3s of unbroken sight
        detectionGain += (crouching ? 0.8 : 1.6) * (w.suspicionTimer / 80);
      } else if (w.state === 'suspicious') {
        // Stopped and scanning — slow drain if player hides
        if (w._seesPlayer) detectionGain += crouching ? 0.8 : 1.6;
      }
    });

    if (detectionGain > 0) {
      GameState.detection += detectionGain;
    } else {
      GameState.detection -= 0.5;
    }
    GameState.detection = Math.max(0, Math.min(100, GameState.detection));

    // --- 3. Game over ---------------------------------------------------
    if (GameState.detection >= 100) {
      GameState.phase = 'gameover';
      return;
    }

    // --- 4. State transitions -------------------------------------------
    const det = GameState.detection;

    // Find nearest worker to player (used for alert/chase promotion)
    let nearestWorker = null;
    let nearestDist   = Infinity;
    workers.forEach(w => {
      const d = Math.hypot(px - w.x, py - w.y);
      if (d < nearestDist) { nearestDist = d; nearestWorker = w; }
    });

    workers.forEach(w => {
      if (det >= 80) {
        // High alert — chase nearest, all others alert
        if (w === nearestWorker) {
          w.state       = 'chase';
          w.visionRange = 220;
          w.visionAngle = Math.PI / 2;
          w.speed       = w._baseSpeed || 2.5;
        } else {
          w.state       = 'alert';
          w.visionRange = 220;
          w.visionAngle = Math.PI / 2;
        }
      } else if (det >= 40) {
        // Alert threshold
        if (w === nearestWorker && w.state !== 'chase') {
          w.state       = 'alert';
          w.visionRange = 220;
          w.visionAngle = Math.PI / 2;
        }
      } else {
        // Low detection
        if (w.suspicionTimer >= 80) {
          // Full suspicion — this worker goes alert on their own
          w.state       = 'alert';
          w.visionRange = 200;
          w.visionAngle = Math.PI / 2;
        } else if (w.suspicionTimer > 0 && w.state === 'patrol') {
          // Building suspicion — stop and scan (Bob the Robber "?" moment)
          w.state       = 'suspicious';
          w.visionAngle = Math.PI / 2.5;
        } else if (w.suspicionTimer === 0 && (w.state === 'suspicious' || w.state === 'alert')) {
          // Suspicion drained — return to patrol
          w.state       = 'patrol';
          w.visionRange = w._patrolSpeed ? [150, 170, 190, 210][Math.min(GameState.round, 4) - 1] : 150;
          w.visionAngle = Math.PI / 3;
          w.speed       = w._patrolSpeed || 1.2;
        } else if (w.state === 'patrol') {
          w.visionRange = w._patrolSpeed ? [150, 170, 190, 210][Math.min(GameState.round, 4) - 1] : 150;
          w.visionAngle = Math.PI / 3;
          w.speed       = w._patrolSpeed || 1.2;
        }
      }
    });

    // --- 5. Move workers ------------------------------------------------
    workers.forEach(w => {
      if (w.state === 'chase') {
        // Move directly toward player
        const dx   = px - w.x;
        const dy   = py - w.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 1) {
          w.x    += (dx / dist) * w.speed;
          w.y    += (dy / dist) * w.speed;
          w.angle = Math.atan2(dy, dx);
        }

      } else if (w.state === 'suspicious') {
        // Stop moving — slowly scan toward last known player position
        const tx = w.lastKnownX !== null ? w.lastKnownX : px;
        const ty = w.lastKnownY !== null ? w.lastKnownY : py;
        const targetAngle = Math.atan2(ty - w.y, tx - w.x);
        w.angle = rotateToward(w.angle, targetAngle, 0.03);

      } else if (w.state === 'alert') {
        // Stop patrolling; slowly rotate toward player
        const dx          = px - w.x;
        const dy          = py - w.y;
        const targetAngle = Math.atan2(dy, dx);
        w.angle = rotateToward(w.angle, targetAngle, 0.05);

      } else {
        // 'patrol' — move along waypoints, bounce
        const target = w.patrolPath[w.pathIndex];
        const dx     = target.x - w.x;
        const dy     = target.y - w.y;
        const dist   = Math.sqrt(dx * dx + dy * dy);
        const speed  = w._patrolSpeed || w.speed;

        if (dist < speed) {
          // Reached waypoint — advance or reverse
          w.x = target.x;
          w.y = target.y;
          w.pathIndex += w.pathDir;
          if (w.pathIndex >= w.patrolPath.length) {
            w.pathIndex = w.patrolPath.length - 2;
            w.pathDir   = -1;
          } else if (w.pathIndex < 0) {
            w.pathIndex = 1;
            w.pathDir   = 1;
          }
        } else {
          w.x    += (dx / dist) * speed;
          w.y    += (dy / dist) * speed;
          w.angle = Math.atan2(dy, dx);
        }
      }
    });
  }

  // ---------------------------------------------------------------------------
  // draw  (called every frame regardless of phase)
  // ---------------------------------------------------------------------------

  function draw(ctx) {
    if (GameState.phase !== 'playing') return;

    const workers = GameState.workers;
    if (!workers || workers.length === 0) return;

    workers.forEach(w => {

      // --- Vision cone ---------------------------------------------------
      let coneColor;
      if      (w.state === 'chase') coneColor = 'rgba(255, 0,   0,   0.38)';
      else if (w.state === 'alert') coneColor = 'rgba(255, 100, 0,   0.28)';
      else                          coneColor = 'rgba(255, 220, 100, 0.18)';

      ctx.beginPath();
      ctx.moveTo(w.x, w.y);
      ctx.arc(w.x, w.y, w.visionRange,
              w.angle - w.visionAngle / 2,
              w.angle + w.visionAngle / 2);
      ctx.closePath();
      ctx.fillStyle = coneColor;
      ctx.fill();

      // --- Worker body (circle) -----------------------------------------
      ctx.beginPath();
      ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
      ctx.fillStyle = '#cc3300';
      ctx.fill();
      ctx.strokeStyle = '#ff6644';
      ctx.lineWidth = 2;
      ctx.stroke();

      // --- Facing indicator (white dot 18px ahead) ----------------------
      const dotX = w.x + Math.cos(w.angle) * 18;
      const dotY = w.y + Math.sin(w.angle) * 18;
      ctx.beginPath();
      ctx.arc(dotX, dotY, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();

      // --- State label above worker -------------------------------------
      ctx.textAlign = 'center';
      if (w.state === 'suspicious') {
        // Pulsing "?" — intensity tracks suspicion build-up
        const alpha = 0.5 + 0.5 * Math.sin(Date.now() / 120);
        const fill  = Math.floor(w.suspicionTimer / 80 * 255);
        ctx.font      = 'bold 15px Arial';
        ctx.fillStyle = `rgba(255, ${255 - fill}, 50, ${alpha})`;
        ctx.fillText('?', w.x, w.y - w.radius - 4);
      } else if (w.state === 'alert') {
        ctx.font      = 'bold 14px Arial';
        ctx.fillStyle = '#ff6600';
        ctx.fillText('!', w.x, w.y - w.radius - 4);
      } else if (w.state === 'chase') {
        ctx.font      = 'bold 16px Arial';
        ctx.fillStyle = '#ff0000';
        ctx.fillText('!!', w.x, w.y - w.radius - 4);
      } else if (w.suspicionTimer > 0) {
        // Patrol worker with partial suspicion — faint "?"
        ctx.font      = 'bold 13px Arial';
        ctx.fillStyle = `rgba(255, 200, 50, ${w.suspicionTimer / 80 * 0.7})`;
        ctx.fillText('?', w.x, w.y - w.radius - 4);
      }
    });

    // Reset text align so other modules aren't affected
    ctx.textAlign = 'left';
  }

  // ---------------------------------------------------------------------------
  // Public API
  // ---------------------------------------------------------------------------

  return { init, update, draw, reset };

})();

// Module 1 — UI, HUD & Screens
// Owns: HUD overlay, start/gameover/win screens, button clicks, sound cues.

window.UI = (function () {
  const btns = {};
  let frame = 0;
  let lastDetection = 0;
  let lastPhase = 'start';
  let prevGrabFlash = 0;

  // ─── Web Audio Sound Engine ───────────────────────────────────────────────
  let _ac = null;
  function getAC() {
    if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
    return _ac;
  }

  function playNotes(notes) {
    try {
      const ac = getAC();
      let t = ac.currentTime;
      notes.forEach(({ f, d, v, type }) => {
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.type = type || 'square';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(v || 0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + d);
        osc.start(t);
        osc.stop(t + d + 0.01);
        t += d;
      });
    } catch (_) {}
  }

  const SOUNDS = {
    grab:     () => playNotes([{ f: 880,  d: 0.05 }, { f: 1320, d: 0.07 }]),
    alert:    () => playNotes([{ f: 330,  d: 0.13, type: 'sawtooth' }, { f: 495,  d: 0.15, type: 'sawtooth' }]),
    chase:    () => playNotes([{ f: 520,  d: 0.06 }, { f: 520, d: 0.06 }, { f: 520, d: 0.10 }]),
    gameover: () => playNotes([{ f: 400,  d: 0.18 }, { f: 300, d: 0.18 }, { f: 180, d: 0.35 }]),
    win:      () => playNotes([{ f: 523,  d: 0.09 }, { f: 659, d: 0.09 }, { f: 784, d: 0.15 }]),
  };

  function checkSoundCues() {
    const d   = GameState.detection;
    const phase = GameState.phase;
    const gf  = GameState.grabFlash || 0;

    if (phase === 'playing') {
      if (d >= 50 && lastDetection < 50) { SOUNDS.alert(); GameState.shakeFrames = 6;  GameState.shakeMag = 3; }
      if (d >= 80 && lastDetection < 80) { SOUNDS.chase(); GameState.shakeFrames = 12; GameState.shakeMag = 5; }
    }

    if (gf > 0 && prevGrabFlash === 0) SOUNDS.grab();

    if (phase === 'gameover' && lastPhase === 'playing') { SOUNDS.gameover(); GameState.shakeFrames = 20; GameState.shakeMag = 8; }
    if (phase === 'win'      && lastPhase === 'playing')   SOUNDS.win();

    lastDetection = d;
    lastPhase     = phase;
    prevGrabFlash = gf;
  }

  // ─── Init ─────────────────────────────────────────────────────────────────

  function init() {
    GameState.canvas.addEventListener('mousedown', (e) => {
      const rect = GameState.canvas.getBoundingClientRect();
      handleClick(e.clientX - rect.left, e.clientY - rect.top);
      // Resume AudioContext on first interaction (browser autoplay policy)
      try { getAC().resume(); } catch (_) {}
    });
  }

  function handleClick(mx, my) {
    const phase = GameState.phase;
    if (phase === 'start'    && hit(mx, my, btns.start)) { Engine.reset(); GameState.phase = 'playing'; }
    if (phase === 'start'    && hit(mx, my, btns.help))  { GameState.phase = 'help'; }
    if (phase === 'help'     && hit(mx, my, btns.back))  { GameState.phase = 'start'; }
    if (phase === 'gameover' && hit(mx, my, btns.retry)) { Engine.reset(); GameState.phase = 'playing'; }
    if (phase === 'win'      && hit(mx, my, btns.next))  { GameState.round++; Engine.reset(); GameState.phase = 'playing'; }
  }

  function hit(mx, my, r) {
    return r && mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h;
  }

  // ─── Draw ─────────────────────────────────────────────────────────────────

  function draw(ctx) {
    frame++;
    const phase = GameState.phase;
    checkSoundCues();

    if (phase === 'playing') {
      drawHUD(ctx);
    } else if (phase === 'start') {
      drawStartScreen(ctx);
    } else if (phase === 'help') {
      drawHelpScreen(ctx);
    } else if (phase === 'gameover') {
      drawGameOverScreen(ctx);
    } else if (phase === 'win') {
      drawWinScreen(ctx);
    }
  }

  // ─── HUD ──────────────────────────────────────────────────────────────────

  function drawHUD(ctx) {
    const gs = GameState;

    // Score
    ctx.fillStyle = '#ffffff';
    ctx.font = '16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('Score: ' + gs.score, 20, 24);

    // Round
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '12px monospace';
    ctx.fillText('Round ' + gs.round, 20, 44);

    // Inventory count (center)
    ctx.fillStyle = '#ffffff';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(gs.player.inventory.length + ' item' + (gs.player.inventory.length !== 1 ? 's' : ''), 400, 24);

    // Detection meter
    const mx = 578, my = 28, mw = 202, mh = 18;
    const pct = gs.detection / 100;

    // "BUSTED" label — flashes red in danger zone
    const flash = gs.detection > 80 && (frame % 30) < 15;
    ctx.fillStyle = flash ? '#ff4444' : '#cccccc';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('BUSTED', 780, my - 4);

    // Meter background
    ctx.fillStyle = '#333333';
    ctx.fillRect(mx, my, mw, mh);

    // Meter fill
    ctx.fillStyle = pct < 0.5 ? '#33cc33' : pct < 0.8 ? '#ff9900' : '#cc3300';
    ctx.fillRect(mx, my, mw * pct, mh);

    // Meter border
    ctx.strokeStyle = '#555555';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx, my, mw, mh);

    ctx.textAlign = 'left'; // reset
  }

  // ─── Shared helpers ───────────────────────────────────────────────────────

  function panel(ctx, x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.90)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#444444';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
  }

  function button(ctx, label, x, y, w, h, bg, key) {
    ctx.fillStyle = bg;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, x + w / 2, y + h / 2 + 5);
    btns[key] = { x, y, w, h };
  }

  // ─── Start Screen ─────────────────────────────────────────────────────────

  function drawStartScreen(ctx) {

    ctx.shadowBlur = 14;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 34px monospace';
    ctx.fillText('MEAL PLAN ZERO', cx, py + 58);
    ctx.shadowBlur = 0;

    // Tagline
    ctx.fillStyle = `rgba(80, 220, 140, ${0.6 + 0.4 * pulse})`;

    ctx.fillText('sneak in.   grab food.   get out.', cx, py + 82);

    ctx.fillStyle = '#aaaaaa';
    ctx.font = '14px monospace';
    ctx.fillText('Your meal plan ran out.', cx, py + 118);
    ctx.fillText("You're hungry.", cx, py + 138);
    ctx.fillText('The dining hall is open.', cx, py + 158);

    button(ctx, '[ START GAME ]', cx - 90, py + 185, 180, 36, '#336699', 'start');
    button(ctx, '[ ? HOW TO PLAY ]', cx - 80, py + 230, 160, 28, '#2a2a2a', 'help');

    ctx.fillStyle = '#555555';
    ctx.font = '11px monospace';
    ctx.fillText('─────────────────────────────', cx, py + 256);

    ctx.fillStyle = '#888888';
    ctx.font = '11px monospace';
    ctx.fillText('WASD  —  Move', cx, py + 275);
    ctx.fillText('Shift  —  Crouch  (reduces detection)', cx, py + 293);
    ctx.fillText('E  —  Grab food when close to counter', cx, py + 311);
    ctx.fillText('Reach the green EXIT to escape', cx, py + 329);

    ctx.fillStyle = '#555555';
    ctx.fillText('─────────────────────────────', cx, py + 348);

    ctx.textAlign = 'left';
  }

  // ─── Help / Controls Screen ───────────────────────────────────────────────

  function drawHelpScreen(ctx) {

  function drawGameOverScreen(ctx) {

    } else {

        ctx.fillStyle = food.color || '#cccccc';
        ctx.font = '12px monospace';
        ctx.fillText('+ ' + food.label + '   (' + food.points + ' pts)', cx, yy);
        yy += 20;
      });
      if (inv.length > 6) {
        ctx.fillStyle = '#666666';
        ctx.font = '11px monospace';
        ctx.fillText('...and ' + (inv.length - 6) + ' more', cx, yy);
        yy += 18;
      }
    }

    ctx.fillStyle = '#555555';
    ctx.font = '11px monospace';
    ctx.fillText('──────────────────────────────', cx, yy + 4);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('Score: ' + gs.score + ' pts', cx, yy + 28);

    button(ctx, '[ NEXT ROUND ]', cx - 85, yy + 46, 170, 36, '#336633', 'next');

    ctx.textAlign = 'left';
  }

  return { init, draw };
})();

// =============================================================================
// Module 1 — Core Engine & Game Loop
// File: js/engine.js
// Exposes: window.Engine = { init, reset }
// Orchestrates all modules. Owns canvas, input, RAF loop, camera, phase
// transitions.
// =============================================================================

window.Engine = (function () {

  let _lastTime = null; // null = first frame sentinel

  // ─── Camera ────────────────────────────────────────────────────────────────
  // Centers the viewport on the player, clamped to world bounds.

  function _updateCamera() {
    const gs = window.GameState;
    const p  = gs.player;
    const WW = gs.worldWidth;
    const WH = gs.worldHeight;
    gs.cam.x = Math.max(0, Math.min(WW - gs.width,  p.x + p.width  / 2 - gs.width  / 2));
    gs.cam.y = Math.max(0, Math.min(WH - gs.height, p.y + p.height / 2 - gs.height / 2));
  }

  // ─── Main Loop ─────────────────────────────────────────────────────────────
  // Draw order each frame:
  //   1. Clear
  //   2. [camera + shake transform] → Map → Workers → Player → [restore]
  //   3. UI (HUD / screen overlay) — always canvas-space, never transformed

  function loop(timestamp) {
    if (_lastTime === null) _lastTime = timestamp;
    const dt = Math.min((timestamp - _lastTime) / 1000, 0.05); // cap at 50 ms
    _lastTime = timestamp;

    const gs  = window.GameState;
    const ctx = gs.ctx;

    ctx.clearRect(0, 0, gs.width, gs.height);

    // ── Game logic update ───────────────────────────────────────────────────
    if (gs.phase === 'playing') {
      Workers.update(dt);
      Player.update(dt);
      _updateCamera();
    }

    // ── World layer — camera + optional shake combined into one transform ───
    const shaking = gs.phase === 'playing' && gs.shakeFrames > 0;
    const sx = shaking ? (Math.random() - 0.5) * (gs.shakeMag || 5) : 0;
    const sy = shaking ? (Math.random() - 0.5) * (gs.shakeMag || 5) : 0;
    if (shaking) gs.shakeFrames--;

    ctx.save();
    ctx.translate(-gs.cam.x + sx, -gs.cam.y + sy);

    Map.draw(ctx);

    if (gs.phase === 'playing') {
      Workers.draw(ctx);
      Player.draw(ctx);
    }

    ctx.restore(); // restore BEFORE UI so HUD is never shaken or scrolled

    // ── UI layer (always on top, always in canvas space) ───────────────────
    UI.draw(ctx);

    requestAnimationFrame(loop);
  }

  // ─── Init ──────────────────────────────────────────────────────────────────

  function init() {
    const gs = window.GameState;

    const canvas = document.createElement('canvas');
    canvas.id = 'game-canvas';
    canvas.width  = gs.width;
    canvas.height = gs.height;
    document.getElementById('game-container').appendChild(canvas);
    gs.canvas = canvas;
    gs.ctx    = canvas.getContext('2d');

    window.addEventListener('keydown', (e) => {
      gs.keys[e.key] = true;
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', (e) => {
      gs.keys[e.key] = false;
    });

    Map.init();
    Player.init();
    Workers.init();
    UI.init();

    requestAnimationFrame(loop);
  }

  // ─── Reset ─────────────────────────────────────────────────────────────────
  // Called on retry / new round. Does NOT set phase or round — UI does that.

  function reset() {
    const gs = window.GameState;

    gs.detection        = 0;
    gs.keys             = {};
    gs.shakeFrames      = 0;
    gs.grabFlash        = 0;
    gs.cam.x            = 0;
    gs.cam.y            = 0;
    gs.player.inventory = [];
    gs.player.x         = 50;
    gs.player.y         = 1200;
    gs.player.crouching = false;

    Map.reset();
    Player.reset();
    Workers.reset(gs.round);
  }

  return { init, reset };

})();

window.addEventListener('load', () => Engine.init());
  </script>
</body>
